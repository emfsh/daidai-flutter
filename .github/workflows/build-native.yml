name: Build Native Android & iOS

on:
  push:
    branches: [ main ]
    tags: [ 'v*-native' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android-native:
    name: Build Android Native
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: android-native
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk \
            ../daidai-native-v${{ steps.version.outputs.VERSION }}-android.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-native-apk
          path: daidai-native-v${{ steps.version.outputs.VERSION }}-android.apk
          if-no-files-found: error

  build-ios-native:
    name: Build iOS Native
    runs-on: macos-15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: ios-native
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build iOS (no codesign)
        run: |
          xcodebuild \
            -project DaidaiPanel.xcodeproj \
            -scheme DaidaiPanel \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/DaidaiPanel.app Payload/
          zip -r ../daidai-native-ios.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-native-ipa
          path: daidai-native-ios.ipa
          if-no-files-found: error

  release-native:
    name: Create Native Release
    needs: [build-android-native, build-ios-native]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-native-apk
          path: release-files

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: ios-native-ipa
          path: release-files

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'versionName' android-native/app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_TAG=v${VERSION}-native" >> $GITHUB_OUTPUT
          fi

      - name: Generate Release Notes
        id: release_notes
        run: |
          RELEASE_TAG="${{ steps.version.outputs.RELEASE_TAG }}"
          cat > /tmp/release_notes.md << 'EOF'
          ## 呆呆面板 Native ${{ steps.version.outputs.RELEASE_TAG }}

          ### Android 原生版
          - Kotlin + Jetpack Compose + MVVM
          - Material3 液态玻璃效果
          - 完整功能：27 个页面，100+ API 端点

          ### iOS 原生版
          - SwiftUI + MVVM
          - .ultraThinMaterial 液态玻璃效果
          - 完整功能：27 个页面，100+ API 端点

          ### 下载说明
          - **Android**: 下载 APK 文件直接安装
          - **iOS**: 下载 IPA 文件，通过 AltStore 或 Sideloadly 安装
          EOF
          echo "file=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="${{ steps.version.outputs.RELEASE_TAG }}"
          NOTES_FILE="${{ steps.release_notes.outputs.file }}"

          if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "Native ${{ steps.version.outputs.VERSION }}" \
              --notes-file "$NOTES_FILE"
            gh release upload "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              release-files/* \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "Native ${{ steps.version.outputs.VERSION }}" \
              --notes-file "$NOTES_FILE" \
              release-files/*
          fi
